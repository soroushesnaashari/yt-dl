name: Download YouTube Video

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL'
        required: true
        type: string
      quality:
        description: 'Preferred video quality'
        required: true
        type: choice
        default: '1080'
        options:
          - 1080
          - 720
          - 480
          - 360
      cookies:
        description: '(Optional) Netscape cookies file (paste raw content)'
        required: false
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # needed to push commits

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install yt-dlp
        run: pip install -U yt-dlp

      - name: Start WARP Proxy
        run: |
          echo "Starting Cloudflare WARP container..."
          docker run -d \
            --name warp \
            --restart=no \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            caomingjun/warp
          echo "Waiting for WARP to initialize (30 seconds)..."
          sleep 30
          curl -x socks5h://127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace -s || echo "WARP may not be ready, will try anyway"

      - name: Save cookies (if provided)
        if: ${{ github.event.inputs.cookies != '' }}
        run: printf '%s\n' "${{ github.event.inputs.cookies }}" > cookies.txt

      - name: Clean previous downloads
        run: |
          rm -rf download/*
          echo "Download folder cleaned"

      - name: Run downloader
        env:
          VIDEO_URL: ${{ github.event.inputs.video_url }}
          QUALITY: ${{ github.event.inputs.quality }}
          COOKIES_FILE: ${{ github.event.inputs.cookies != '' && 'cookies.txt' || '' }}
          PROXY_ADDRESS: socks5://127.0.0.1:1080
        run: go run main.go

      - name: Split zip into 90 MB chunks
        run: |
          cd download
          split -b 90M -d video.zip video.zip.
          rm video.zip   # remove original after splitting
          ls -la         # verify chunks

      - name: Commit chunks to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add download/
          git commit -m "Downloaded video (split into chunks)" || echo "No changes to commit"
          git push
